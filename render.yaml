services:
  # Backend Service
  - type: web
    name: ituka-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false  # You must add this manually in Render Dashboard
      - key: JWT_SECRET
        sync: false  # You must add this manually in Render Dashboard
      - key: CORS_ORIGINS
        sync: false  # You must add this manually (Frontend URL)
